[Setting]
spotify_path           = /opt/spotify
current_theme          = Sleek
inject_theme_js        = 1
inject_css             = 1
replace_colors         = 1
spotify_launch_flags   = --ozone-platform=wayland
check_spicetify_update = 1
prefs_path             = /home/dominus/.config/spotify/prefs
