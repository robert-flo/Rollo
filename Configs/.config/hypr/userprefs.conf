# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hypr.land/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hypr.land/Configuring/Variables/#input
input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    # рҹ”— See https://wiki.hypr.land/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# Keybinding for Omarchy Menu
bindd = SUPER, O, Omarchy menu, exec, omarchy-menu

# Emacs вҖ” overrides HyDE binds from keybindings.conf (loaded earlier in hyprland.conf)
# Import Wayland environment into systemd so services can see the display.
# Launch Emacs directly (matches nixos-config; Emacs starts its own server via init.el).
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR DISPLAY
exec-once = emacs
# Assign Emacs to workspace 1 on startup.
windowrule = workspace 1,match:class ^(Emacs)$
# HyDE Super+Shift+E was: file finder ($rofi-launch f)
unbind = $mainMod Shift, E
bindd = $mainMod Shift, E, Launch Emacs, exec, $HOME/.local/bin/emacs-launch-frame
# HyDE Super+E was: file explorer ($EXPLORER) вҖ” from joshuablais: $mainMod, E (vterm)
unbind = $mainMod, E
bindd = $mainMod, E, Open vterm frame, exec, $HOME/.local/bin/emacs-new-vterm-frame
bindd = $mainMod, SPACE, Universal launcher, exec, emacsclient -c -n -e '(progn (universal-launcher-popup))'
bindd = CTRL SHIFT, x, Org roam daily capture, exec, emacsclient -c -n -e '(progn (org-roam-dailies-capture-today))'
bindd = CTRL SHIFT, c, Org capture, exec, emacsclient -c -n -e '(progn (org-capture))'
bindd = $mainMod CTRL, F, Dirvish file manager, exec, emacsclient -c -n -e '(progn (dirvish))'
# HyDE Super+P was: snip screen
unbind = $mainMod, P
bindd = $mainMod, P, Password store, exec, emacsclient -c -n -e '(progn (ignore-errors (pass) (call-interactively (quote pass-goto-entry))))'
bindd = CTRL SHIFT, D, Download media, exec, emacsclient -c -n -e '(progn (jb/download-media))'
# HyDE Super+C was: text editor ($EDITOR)
unbind = $mainMod, C
bindd = $mainMod, C, Org agenda dashboard, exec, emacsclient -c -n -e '(progn (my/org-agenda-dashboard))'
# HyDE Super+M was: spotify
unbind = $mainMod, M
bindd = $mainMod, M, MU4e mail, exec, emacsclient -c -n -e '(progn (my/mu4e-launch))'
# HyDE Super+Ctrl+Z was: toggle monitor layout
unbind = $mainMod Control, Z
bindd = $mainMod Control, Z, Elfeed, exec, emacsclient -c -n -e '(progn (elfeed))'
# HyDE Super+Ctrl+M was: toggle mute for active window
unbind = $mainMod Control, M
bindd = $mainMod Control, M, EMMS music player, exec, emacsclient -c -n -e '(progn (emms-playlist-mode-go))'
bindd = $mainMod Control, E, Emacs everywhere, exec, $HOME/.local/bin/emacs-everywhere
bindd = $mainMod Control, Y, Clipboard manager, exec, emacsclient -c -n -e '(progn (jb/clipboard-manager))'



