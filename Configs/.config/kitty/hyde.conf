# This is the configuration file for kitty terminal
# For more information, see https://sw.kovidgoyal.net/kitty/conf.html
# For your custom configurations, put it in ./kitty.conf
font_family CaskaydiaCove Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
enable_audio_bell no
font_size 10.0
window_padding_width 0

# Rastro/estela del cursor al moverse (longitud del efecto visual)
cursor_trail 1

# Themes can override any settings in this file
include theme.conf
#background_opacity 0.60
#hide_window_decorations yes
#confirm_os_window_close 0

# --- COMPORTAMIENTO GENERAL ---

# Copiar automáticamente al portapapeles cualquier texto seleccionado con el mouse
copy_on_select yes

# --- CONTROL REMOTO Y SCRIPTING ---

# Permite controlar kitty mediante scripts o comandos desde la terminal
allow_remote_control yes

# Ruta del socket Unix para escuchar las peticiones de control remoto
listen_on unix:/tmp/kitty


# --- INTEGRACIÓN CON WAYLAND ---

# Hace que kitty respete el color del tema del sistema para la barra de título en Wayland
wayland_titlebar_color system

# Fuerza el uso del servidor gráfico Wayland en Linux
linux_display_server wayland


# --- DISEÑOS DE VENTANA (LAYOUTS) ---

# Distribuciones de ventanas habilitadas (splits: libre, stack: maximizado, tall/fat: automáticos)
enabled_layouts splits,stack,tall,fat

# Atajos para crear y manipular divisiones (panes)
# ctrl+alt+enter: Crea una nueva ventana dividiendo horizontalmente (hsplit)
map ctrl+alt+enter launch --location=hsplit

# ctrl+alt+s: Crea una nueva ventana dividiendo verticalmente (vsplit)
map ctrl+alt+s     launch --location=vsplit

# ctrl+alt+r: Rota la orientación del diseño actual
map ctrl+alt+r     layout_action rotate

# Mover el foco entre paneles usando Ctrl+Alt + Flechas
map ctrl+alt+left neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up neighboring_window up
map ctrl+alt+down neighboring_window down

# Mover el foco entre paneles usando Ctrl+Alt + H/J/K/L (Estilo Vim)
map ctrl+alt+h neighboring_window left
map ctrl+alt+l neighboring_window right
map ctrl+alt+k neighboring_window up
map ctrl+alt+j neighboring_window down


# --- PANTALLA COMPLETA ---

# Alternar pantalla completa con F11 o Super (tecla Windows) + Enter
map f11 toggle_fullscreen
map super+enter toggle_fullscreen


# --- TAMAÑO DE FUENTE ---

# Aumentar/disminuir el tamaño de la letra globalmente
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0


# --- PORTAPAPELES (COPIAR / PEGAR) ---

# Atajos clásicos para interactuar con el portapapeles del sistema
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard


# --- GESTIÓN DE VENTANAS Y PESTAÑAS ---

# ctrl+shift+n: Abre una ventana de terminal nueva e independiente (OS Window)
map ctrl+shift+n new_os_window

# ctrl+shift+t: Abre una pestaña nueva dentro de la misma ventana de kitty
map ctrl+shift+t new_tab


# --- NAVEGACIÓN ENTRE PESTAÑAS ---

# Ir a la siguiente pestaña (ctrl+tab o ctrl+shift+])
map ctrl+tab next_tab
map ctrl+shift+] next_tab

# Ir a la pestaña anterior (ctrl+shift+tab o ctrl+shift+[)
map ctrl+shift+tab previous_tab
map ctrl+shift+[ previous_tab


# --- SELECCIÓN DIRECTA DE PESTAÑAS ---

# Ir directamente a una pestaña usando su número de orden (del 1 al 8)
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
