include hyde.conf

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                            NEOVIM OPTIMIZATIONS                              │
# └──────────────────────────────────────────────────────────────────────────────┘

# Undercurl support (LSP diagnostics, spelling)
undercurl_style thin-sparse

# Scrollback lines
scrollback_lines 10000

# Disable audio bell
enable_audio_bell no

# Remote control for Neovim integrations (e.g. kitty-navigator)
allow_remote_control socket-only
listen_on unix:/tmp/kitty
